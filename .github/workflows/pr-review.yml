name: PR Review Reminder

on:
  pull_request:
    types: [opened, reopened]

jobs:
  reminder:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Add review comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '🧪 **Code Review Checklist**',
              '',
              '**Automatizado por CI** *(ver checks abajo)*',
              '- ~~No hay errores de lint~~ → `pnpm lint` ✅',
              '- ~~El código sigue el formato del proyecto~~ → `prettier --check` ✅',
              '',
              '**Revisión manual**',
              '- [ ] He revisado mi propio código',
              '- [ ] He probado los cambios manualmente',
              '- [ ] No introduzco deuda técnica ni efectos secundarios inesperados',
              '',
              '💡 Recuerda: un buen PR = menos bugs en producción 🚀',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
